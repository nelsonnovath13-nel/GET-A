// ── HELPER: render **bold** text ──────────────────────────────────────────────
function Bold({text}) {
  const parts = text.split(/(\*\*[^*]+\*\*)/g);
  return parts.map((p,i)=>
    p.startsWith('**')
    ? <strong key={i} className="text-blue-300 font-semibold">{p.slice(2,-2)}</strong>
    : <span key={i}>{p}</span>
  );
}

// ── QUIZ COMPONENT ────────────────────────────────────────────────────────────
const MOTIVATIONS_OK = ['🔥 Excellent!','✨ Perfect!','🎯 Exactly right!','💪 Brilliant!','⚡ Outstanding!','🌟 Correct!'];
const MOTIVATIONS_NO = ['💡 Here\'s why:','🤔 Common mistake:','📚 The key insight:','🔍 Let\'s look:','💬 Fix:'];

function Quiz({questions, color}) {
  const [states, setStates] = useState(questions.map(()=>({sel:null,done:false,ok:false})));
  const [reset, setReset] = useState(0);

  useEffect(()=>{
    setStates(questions.map(()=>({sel:null,done:false,ok:false})));
  },[reset]);

  const answered = states.filter(s=>s.done).length;
  const score = states.filter(s=>s.ok).length;
  const allDone = answered===questions.length;

  const sel = (qi,oi)=>{
    if(states[qi].done) return;
    setStates(prev=>{const n=[...prev];n[qi]={...n[qi],sel:oi};return n;});
  };
  const check = (qi)=>{
    if(states[qi].sel===null||states[qi].done) return;
    const ok = states[qi].sel===questions[qi].c;
    setStates(prev=>{const n=[...prev];n[qi]={...n[qi],done:true,ok};return n;});
  };

  const pct = questions.length>0 ? Math.round(score/questions.length*100) : 0;

  return (
    <div className="mb-8">
      <div className="flex items-center justify-between mb-4">
        <h4 className="text-lg font-semibold text-slate-300 flex items-center gap-2">
          <span>🧪</span> Practice Quiz
        </h4>
        <div className="flex items-center gap-3">
          {allDone && <button onClick={()=>setReset(r=>r+1)} className="text-xs bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1.5 rounded-lg transition-colors">🔄 Retry</button>}
          <span className="text-sm text-slate-500">{answered}/{questions.length}</span>
        </div>
      </div>

      <div className="h-1.5 bg-slate-800 rounded-full mb-6 overflow-hidden">
        <div className="h-full bg-gradient-to-r from-blue-500 to-cyan-400 rounded-full transition-all duration-500"
          style={{width:`${questions.length?answered/questions.length*100:0}%`}} />
      </div>

      {allDone && (
        <div className={`mb-6 rounded-2xl p-5 border text-center ${pct>=80?'bg-green-900/30 border-green-600/40':pct>=50?'bg-yellow-900/30 border-yellow-600/40':'bg-blue-900/30 border-blue-600/40'}`}>
          <div className="text-2xl mb-1">{pct>=80?'🏆':pct>=50?'👍':'📚'}</div>
          <div className="font-bold text-white text-lg">{pct>=80?'Excellent!':pct>=50?'Good Progress!':'Keep Practising!'}</div>
          <div className="text-slate-300 text-sm mt-1">Score: {score}/{questions.length} ({pct}%)</div>
        </div>
      )}

      <div className="space-y-5">
        {questions.map((q,qi)=>{
          const st=states[qi];
          const mot = st.done ? (st.ok ? MOTIVATIONS_OK[qi%6] : MOTIVATIONS_NO[qi%5]) : null;
          return (
            <div key={qi} className={`rounded-2xl border overflow-hidden ${st.done?(st.ok?'border-green-600/50 bg-green-900/10':'border-red-600/50 bg-red-900/10'):'border-slate-700 bg-slate-800/40'}`}>
              <div className="p-4">
                <div className="flex gap-3 mb-3">
                  <div className={`flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${st.done?(st.ok?'bg-green-600 text-white':'bg-red-600 text-white'):'bg-slate-700 text-slate-300'}`}>
                    {st.done?(st.ok?'✓':'✗'):qi+1}
                  </div>
                  <p className="text-slate-100 font-medium leading-relaxed">{q.q}</p>
                </div>
                <div className="grid gap-2 ml-10">
                  {q.opts.map((opt,oi)=>{
                    let cls='w-full text-left px-3 py-2.5 rounded-xl text-sm font-medium transition-all border ';
                    if(!st.done) cls+=st.sel===oi?'bg-blue-600/30 border-blue-500 text-blue-200':'bg-slate-700/50 border-slate-600 text-slate-300 hover:bg-slate-700 hover:border-slate-500 cursor-pointer';
                    else if(q.c===oi) cls+='bg-green-700/30 border-green-500 text-green-200';
                    else if(st.sel===oi) cls+='bg-red-700/30 border-red-500 text-red-200 line-through';
                    else cls+='bg-slate-700/20 border-slate-700 text-slate-500';
                    return(
                      <button key={oi} className={cls} onClick={()=>sel(qi,oi)} disabled={st.done}>
                        <span className="font-bold text-slate-400 mr-1">{String.fromCharCode(65+oi)}.</span>{opt}
                        {st.done&&q.c===oi&&<span className="ml-1 text-green-400">✓</span>}
                      </button>
                    );
                  })}
                </div>
                {!st.done&&(
                  <div className="mt-3 ml-10">
                    <button onClick={()=>check(qi)} disabled={st.sel===null}
                      className={`px-4 py-1.5 rounded-xl text-sm font-semibold transition-all ${st.sel!==null?'bg-blue-600 hover:bg-blue-500 text-white cursor-pointer':'bg-slate-700 text-slate-500 cursor-not-allowed'}`}>
                      Check →
                    </button>
                  </div>
                )}
              </div>
              {st.done&&(
                <div className={`border-t px-4 py-3 ${st.ok?'bg-green-900/20 border-green-700/30':'bg-blue-900/20 border-blue-700/30'}`}>
                  <div className="flex gap-2 items-start">
                    <span className="text-base mt-0.5">{st.ok?'🎯':'💡'}</span>
                    <div>
                      <div className="text-xs font-semibold text-slate-300 mb-0.5">{mot}</div>
                      <p className="text-sm text-slate-300 leading-relaxed">{q.exp}</p>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {allDone&&(
        <div className="mt-4 bg-slate-800/50 rounded-2xl p-5 border border-slate-700 text-center">
          <div className="text-3xl font-extrabold text-white mb-1">{score}/{questions.length}</div>
          <div className="h-2 bg-slate-700 rounded-full overflow-hidden mb-3">
            <div className={`h-full rounded-full ${pct>=80?'bg-green-500':pct>=60?'bg-yellow-500':'bg-blue-500'}`} style={{width:`${pct}%`}} />
          </div>
          <button onClick={()=>setReset(r=>r+1)} className="bg-blue-600 hover:bg-blue-500 text-white font-semibold px-5 py-2 rounded-xl text-sm transition-colors">🔄 Try Again</button>
        </div>
      )}
    </div>
  );
}

// ── SECTION COMPONENT ─────────────────────────────────────────────────────────
function Section({sec, topicColor, topicGrad, sIdx}) {
  const [open, setOpen] = useState(false);
  return (
    <div id={sec.id} className="mb-6 scroll-mt-4">
      <button onClick={()=>setOpen(o=>!o)}
        className="w-full flex items-center justify-between bg-slate-800/60 hover:bg-slate-800 rounded-2xl p-5 border border-slate-700 transition-all group text-left">
        <div className="flex items-center gap-3">
          <div className={`w-8 h-8 rounded-lg bg-gradient-to-br ${topicGrad} flex items-center justify-center text-white text-xs font-bold`}>{sIdx+1}</div>
          <span className="font-semibold text-slate-200 group-hover:text-white transition-colors">{sec.title}</span>
          <span className="hidden sm:inline-flex gap-2 ml-2">
            <span className="text-xs bg-slate-700 text-slate-400 px-2 py-0.5 rounded-full">{sec.examples.length} examples</span>
            <span className="text-xs bg-slate-700 text-slate-400 px-2 py-0.5 rounded-full">{sec.quiz.length} quiz</span>
          </span>
        </div>
        <svg className={`w-5 h-5 text-slate-400 transition-transform ${open?'rotate-180':''}`} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      {open&&(
        <div className="mt-3 fade-in">
          {/* Theory */}
          <div className="mb-6">
            <h4 className="flex items-center gap-2 text-sm font-semibold text-slate-400 uppercase tracking-wide mb-3">
              <span>📖</span> Theory & Definitions
            </h4>
            <div className="space-y-3">
              {sec.theory.map((t,i)=>(
                <div key={i} className="bg-slate-800/50 rounded-xl p-4 border border-slate-700 text-slate-300 leading-relaxed">
                  <Bold text={t}/>
                </div>
              ))}
            </div>
          </div>

          {/* Key Facts */}
          <div className="mb-6">
            <h4 className="flex items-center gap-2 text-sm font-semibold text-slate-400 uppercase tracking-wide mb-3">
              <span>💡</span> Key Facts (Exam Quick Revision)
            </h4>
            <div className="grid sm:grid-cols-2 gap-2">
              {sec.facts.map((f,i)=>(
                <div key={i} className="flex items-start gap-2 bg-blue-900/20 border border-blue-800/30 rounded-xl p-3">
                  <span className="text-blue-400 font-bold">✓</span>
                  <code className="text-sm text-blue-200 font-mono">{f}</code>
                </div>
              ))}
            </div>
          </div>

          {/* Examples */}
          <div className="mb-6">
            <h4 className="flex items-center gap-2 text-sm font-semibold text-slate-400 uppercase tracking-wide mb-3">
              <span>✏️</span> Worked Examples (Step-by-Step)
            </h4>
            <div className="space-y-4">
              {sec.examples.map((ex,ei)=>(
                <div key={ei} className="rounded-2xl overflow-hidden border border-slate-700">
                  <div className="bg-amber-900/30 border-b border-amber-700/30 px-4 py-2.5 flex items-center gap-2">
                    <span className="bg-amber-500 text-amber-950 font-bold text-xs px-2 py-0.5 rounded-full">Example {sIdx+1}.{ei+1}</span>
                    <span className="font-semibold text-amber-200 text-sm">{ex.title}</span>
                  </div>
                  <div className="bg-slate-800/50 px-4 py-3 border-b border-slate-700">
                    <div className="text-xs uppercase text-slate-500 mb-1 tracking-wider">Question</div>
                    <p className="text-slate-200 text-sm">{ex.prob}</p>
                  </div>
                  <div className="bg-slate-800/30 px-4 py-3 border-b border-slate-700">
                    <div className="text-xs uppercase text-slate-500 mb-2 tracking-wider">Steps</div>
                    <div className="space-y-1.5">
                      {ex.steps.map((s,si)=>(
                        <div key={si} className="flex gap-2 items-start">
                          <span className="flex-shrink-0 w-5 h-5 rounded-full bg-blue-600 text-white text-xs flex items-center justify-center font-bold mt-0.5">{si+1}</span>
                          <code className="text-sm text-slate-300 font-mono bg-slate-700/40 rounded px-2 py-1 flex-1 leading-relaxed">{s}</code>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="bg-green-900/20 px-4 py-3">
                    <div className="text-xs uppercase text-green-500 mb-1 tracking-wider">✅ Answer</div>
                    <p className="text-green-300 font-medium text-sm">{ex.ans}</p>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Quiz */}
          <Quiz questions={sec.quiz} color={topicColor}/>
        </div>
      )}
    </div>
  );
}

// ── TOPIC PAGE ────────────────────────────────────────────────────────────────
function TopicPage({topic, onBack}) {
  useEffect(()=>{window.scrollTo(0,0);},[topic.id]);
  return(
    <div>
      <div className={`bg-gradient-to-r ${topic.grad} py-10 px-4`}>
        <div className="max-w-3xl mx-auto">
          <button onClick={onBack} className="inline-flex items-center gap-1 text-white/70 hover:text-white text-sm mb-4 transition-colors">
            ← All Topics
          </button>
          <div className="flex items-center gap-4">
            <span className="text-5xl">{topic.icon}</span>
            <div>
              <div className="text-white/70 text-xs font-medium">{topic.ch}</div>
              <h1 className="text-2xl md:text-3xl font-bold text-white">{topic.title}</h1>
              <p className="text-white/80 text-sm mt-1">{topic.desc}</p>
            </div>
          </div>
          <div className="flex flex-wrap gap-2 mt-5">
            {topic.sections.map(s=>(
              <a key={s.id} href={`#${s.id}`} className="bg-white/20 hover:bg-white/30 text-white text-xs px-3 py-1 rounded-full transition-colors">{s.title}</a>
            ))}
          </div>
        </div>
      </div>
      <div className="max-w-3xl mx-auto px-4 py-8">
        {topic.sections.map((sec,si)=>(
          <Section key={sec.id} sec={sec} topicColor={topic.bg} topicGrad={topic.grad} sIdx={si}/>
        ))}
        <div className="mt-8 pt-6 border-t border-slate-800 text-center">
          <button onClick={onBack} className="bg-slate-800 hover:bg-slate-700 text-slate-300 hover:text-white px-6 py-3 rounded-xl transition-colors font-medium">
            ← Back to All Topics
          </button>
        </div>
      </div>
    </div>
  );
}

// ── HOME PAGE ─────────────────────────────────────────────────────────────────
function HomePage({onTopic}) {
  const totalQ = TOPICS.reduce((a,t)=>a+t.sections.reduce((b,s)=>b+s.quiz.length,0),0);
  const totalE = TOPICS.reduce((a,t)=>a+t.sections.reduce((b,s)=>b+s.examples.length,0),0);
  const totalS = TOPICS.reduce((a,t)=>a+t.sections.length,0);

  return(
    <div>
      {/* Hero */}
      <header className="relative overflow-hidden bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 pt-16 pb-20">
        <div className="absolute inset-0 opacity-20 pointer-events-none"
          style={{background:'radial-gradient(circle at 20% 50%,#1d4ed8,transparent 50%),radial-gradient(circle at 80% 20%,#7c3aed,transparent 50%)'}}/>
        <div className="relative max-w-4xl mx-auto px-4 text-center">
          <div className="inline-flex items-center gap-2 bg-blue-500/20 border border-blue-500/30 rounded-full px-4 py-2 text-blue-300 text-sm mb-6">
            🎓 IAA Arusha · BCS Year 1 · CSU 07212 / ITU 07210 / CYU 07102
          </div>
          <h1 className="text-5xl md:text-7xl font-extrabold bg-gradient-to-r from-white via-blue-200 to-cyan-300 bg-clip-text text-transparent mb-4">
            Discrete Mathematics
          </h1>
          <p className="text-xl text-blue-200 font-light mb-2">A+ Study Hub — Based on Rosen 7th Edition</p>
          <p className="text-slate-400 text-sm max-w-xl mx-auto mb-8">
            Kila topic imefunzwa kwa njia rahisi, mifano halisi, na maswali ya kutosha. Fuata mpango huu utafaulu kwa A+.
          </p>
          <div className="flex flex-wrap justify-center gap-4 mb-8">
            {[{n:totalS,l:'Sections',c:'blue'},{n:totalE,l:'Worked Examples',c:'purple'},{n:totalQ,l:'Quiz Questions',c:'green'},{n:'A+',l:'Your Goal',c:'orange'}].map(({n,l,c})=>(
              <div key={l} className={`bg-${c}-500/20 rounded-2xl px-5 py-3 border border-${c}-500/30`}>
                <div className={`text-2xl font-bold text-${c}-300`}>{n}</div>
                <div className="text-xs text-slate-400">{l}</div>
              </div>
            ))}
          </div>
          <button onClick={()=>onTopic(TOPICS[0])}
            className="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white font-bold text-base px-7 py-3.5 rounded-2xl transition-all hover:scale-105">
            🚀 Start Learning Now →
          </button>
        </div>
      </header>

      {/* How it works */}
      <section className="py-12 bg-slate-900/50">
        <div className="max-w-4xl mx-auto px-4">
          <h2 className="text-xl font-bold text-center text-slate-300 mb-8">📚 Jinsi Unavyofunza — How It Teaches</h2>
          <div className="grid sm:grid-cols-2 md:grid-cols-4 gap-4">
            {[
              {i:'📖',t:'Theory First',d:'Every concept in plain English. No confusion, no skipping steps.'},
              {i:'✏️',t:'Worked Examples',d:'Every example solved step-by-step like your lecturer does it.'},
              {i:'💡',t:'Key Facts',d:'Instant-recall summary. Perfect for last-minute exam review.'},
              {i:'🧪',t:'Quiz to Master',d:'Psychology-based questions. Every wrong answer fully explained.'},
            ].map(({i,t,d})=>(
              <div key={t} className="bg-slate-800/50 rounded-2xl p-5 border border-slate-700 text-center">
                <div className="text-3xl mb-2">{i}</div>
                <h3 className="font-bold text-slate-200 text-sm mb-1">{t}</h3>
                <p className="text-xs text-slate-400">{d}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* Topics */}
      <section className="py-12">
        <div className="max-w-4xl mx-auto px-4">
          <h2 className="text-2xl font-bold text-center text-white mb-2">📋 Table of Contents</h2>
          <p className="text-center text-slate-500 text-sm mb-8">Masomo yote kutoka notes za mwalimu na Rosen 7th Edition</p>
          <div className="space-y-5">
            {TOPICS.map(t=>(
              <div key={t.id} className="bg-slate-800/60 rounded-3xl overflow-hidden border border-slate-700 hover:border-slate-500 transition-all">
                <div className={`bg-gradient-to-r ${t.grad} p-5`}>
                  <div className="flex items-start justify-between">
                    <div>
                      <span className="text-3xl block mb-1">{t.icon}</span>
                      <div className="text-white/60 text-xs">{t.ch}</div>
                      <h3 className="text-xl font-bold text-white">{t.title}</h3>
                      <p className="text-white/75 text-sm mt-1 max-w-lg">{t.desc}</p>
                    </div>
                    <div className="hidden md:flex flex-col items-end gap-1 ml-4 flex-shrink-0">
                      <span className="bg-white/20 text-white text-xs px-2 py-0.5 rounded-full">{t.sections.length} sections</span>
                      <span className="bg-white/20 text-white text-xs px-2 py-0.5 rounded-full">{t.sections.reduce((a,s)=>a+s.quiz.length,0)} questions</span>
                    </div>
                  </div>
                </div>
                <div className="p-4">
                  <div className="grid sm:grid-cols-2 gap-2 mb-3">
                    {t.sections.map(s=>(
                      <button key={s.id} onClick={()=>onTopic(t)}
                        className="flex items-center gap-2 bg-slate-700/50 hover:bg-slate-700 rounded-xl p-2.5 transition-colors group text-left">
                        <div className="w-7 h-7 rounded-lg bg-slate-600 flex items-center justify-center text-xs font-bold text-slate-300 group-hover:bg-blue-600 group-hover:text-white transition-colors flex-shrink-0">
                          {s.quiz.length}Q
                        </div>
                        <div className="min-w-0">
                          <div className="text-xs font-medium text-slate-200 group-hover:text-white truncate">{s.title}</div>
                          <div className="text-xs text-slate-500">{s.examples.length} examples</div>
                        </div>
                      </button>
                    ))}
                  </div>
                  <button onClick={()=>onTopic(t)}
                    className={`w-full py-2.5 rounded-xl font-semibold text-white bg-gradient-to-r ${t.grad} hover:opacity-90 text-sm transition-opacity`}>
                    Study {t.title} →
                  </button>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <footer className="border-t border-slate-800 py-8 text-center text-slate-500 text-xs">
        <p>🏫 Institute of Accountancy Arusha (IAA) · BCS Year 1 · Discrete Mathematics</p>
        <p className="mt-1">Rosen's Discrete Mathematics 7th Edition · Facilitator: John Francis</p>
      </footer>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App() {
  const [currentTopic, setCurrentTopic] = useState(null);
  return currentTopic
    ? <TopicPage topic={currentTopic} onBack={()=>setCurrentTopic(null)}/>
    : <HomePage onTopic={setCurrentTopic}/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
